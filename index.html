<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Develop Ghana - Tech Blog & Software Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <span class="text-4xl">🇬🇭</span>
        <div class="font-bold">
          <span class="text-3xl text-black">Develop</span>
          <span class="text-3xl text-red-600">Ghana</span>
        </div>
      </a>

      <div class="hidden md:flex items-center gap-8 text-lg">
        <a href="blog.html" class="nav-link">Blog</a>
        <a href="shop.html" class="nav-link">Shop</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="toggleDarkMode()" class="text-xl p-2 hover:bg-gray-100 rounded-xl">
          <i class="fas fa-moon"></i>
        </button>
        <button onclick="showLoginModal()" id="login-btn" class="px-6 py-2.5 bg-red-600 text-white rounded-2xl font-medium hover:bg-red-700 transition">
          Login
        </button>
      </div>

      <button id="mobile-menu-btn" class="md:hidden text-3xl">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- Login Modal -->
  <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl max-w-md w-full mx-4 p-8">
      <h2 class="text-3xl font-bold text-center mb-8">Welcome Back</h2>
      
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2">Email</label>
          <input type="email" id="login-email" value="user@developghana.com" class="w-full px-5 py-4 border rounded-2xl focus:outline-none focus:border-red-500">
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Password</label>
          <input type="password" id="login-password" value="123456" class="w-full px-5 py-4 border rounded-2xl focus:outline-none focus:border-red-500">
        </div>

        <div class="flex gap-3">
          <button onclick="loginAs('user')" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-medium">Login as User</button>
          <button onclick="loginAs('admin')" class="flex-1 py-4 bg-black text-white rounded-2xl font-medium">Login as Admin</button>
        </div>
      </div>

      <button onclick="hideLoginModal()" class="mt-6 w-full py-3 text-gray-500">Close</button>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
</body>
</html>
