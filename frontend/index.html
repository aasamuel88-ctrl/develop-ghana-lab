<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Develop Ghana - Tech Blog & Software Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap');
        body { font-family: 'Open Sans', sans-serif; }
        h1,h2,h3 { font-family: 'Poppins', sans-serif; }
        .hero-bg { background: linear-gradient(rgba(17,17,17,0.8), rgba(17,17,17,0.85)), url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat; }
    </style>
</head>
<body class="bg-white">
    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-black text-white w-10 h-10 rounded-2xl flex items-center justify-center text-3xl font-black">DG</div>
                <span class="font-bold text-3xl tracking-tighter">Develop Ghana</span>
            </div>
            <nav class="hidden md:flex gap-8 font-medium">
                <a href="index.html" class="hover:text-red-600">Home</a>
                <a href="blog.html" class="hover:text-red-600">Blog</a>
                <a href="shop.html" class="hover:text-red-600">Shop</a>
                <a href="about.html" class="hover:text-red-600">About</a>
                <a href="contact.html" class="hover:text-red-600">Contact</a>
            </nav>
            <button onclick="toggleMobileMenu()" class="md:hidden text-3xl"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <div id="mobileMenu" class="hidden fixed inset-0 bg-white z-[100] pt-24 px-8 text-xl">
        <a href="index.html" class="block py-4">Home</a>
        <a href="blog.html" class="block py-4">Blog</a>
        <a href="shop.html" class="block py-4">Shop</a>
        <a href="about.html" class="block py-4">About</a>
        <a href="contact.html" class="block py-4">Contact</a>
    </div>

    <!-- Hero -->
    <section class="hero-bg text-white py-28 md:py-40">
        <div class="max-w-5xl mx-auto text-center px-6">
            <h1 class="text-5xl md:text-7xl font-bold leading-tight mb-6">Empowering Ghana<br>Through Tech & Innovation</h1>
            <p class="text-2xl max-w-xl mx-auto mb-10">Tutorials, Software & Digital Tools for Ghanaian creators and businesses.</p>
            <div class="flex flex-col sm:flex-row gap-5 justify-center">
                <a href="blog.html" class="bg-white text-black px-10 py-5 rounded-full text-lg font-semibold">Explore Blog</a>
                <a href="shop.html" class="border-2 border-white px-10 py-5 rounded-full text-lg font-semibold hover:bg-white hover:text-black">Shop Now</a>
            </div>
        </div>
    </section>

    <script src="assets/js/script.js"></script>
</body>
</html>
